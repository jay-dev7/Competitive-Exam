<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Incircle</title>
    <style>
      body {
        margin: 0;
        padding: 1rem;
        font-family: Arial, sans-serif;
        line-height: 1.5;
        color: #1e293b;
      }
      .card {
        max-width: 760px;
        margin: 0 auto;
        border: 1px solid #dbe3ef;
        border-radius: 12px;
        padding: 1rem;
      }
      h1 {
        margin-top: 0;
      }
      code {
        background: #f4f6fb;
        padding: 0.1rem 0.3rem;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <article class="card">
      <h1>Incircle</h1>
      <p>
        In a triangle, an <strong>incircle</strong> is the largest circle that fits inside the triangle and touches all three sides.
      </p>
      <p>
        Radius formula: <code>r = A / s</code>
      </p>
      <p>
        where <code>A</code> is area of triangle and <code>s</code> is semiperimeter.
      </p>
    </article>
  </body>
</html>
